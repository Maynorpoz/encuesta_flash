AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Encuesta Flash (Votify) - Sistema de Encuestas en Tiempo Real
  Arquitectura Serverless con AWS Lambda, API Gateway y DynamoDB

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref EncuestaFlashTable
        JWT_SECRET: !Ref JWTSecret
        NODE_ENV: !Ref Environment
    Layers:
      - !Ref SharedLayer

Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues:
      - development
      - staging
      - production
    Description: Environment name

  JWTSecret:
    Type: String
    Default: 'secret-key-para-encuestas-serverless-2026'
    NoEcho: true
    Description: Secret key for JWT token signing

Resources:
  # ==========================================
  # DynamoDB Table - Single Table Design
  # ==========================================
  EncuestaFlashTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'EncuestaFlashTable-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        # Primary Key
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        # GSI Attributes
        - AttributeName: username
          AttributeType: S
        - AttributeName: creatorId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: pollId
          AttributeType: S

      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

      GlobalSecondaryIndexes:
        # GSI para buscar usuarios por username
        - IndexName: UsernameIndex
          KeySchema:
            - AttributeName: username
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # GSI para buscar polls por creatorId
        - IndexName: CreatorIndex
          KeySchema:
            - AttributeName: creatorId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # GSI para buscar conexiones WebSocket por pollId
        - IndexName: PollIdIndex
          KeySchema:
            - AttributeName: pollId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

      # Habilitar Streams para triggers de broadcast en tiempo real
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

      # TTL para auto-eliminar conexiones WebSocket expiradas
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

      Tags:
        - Key: Project
          Value: EncuestaFlash
        - Key: Environment
          Value: !Ref Environment

  # ==========================================
  # Lambda Layer - Dependencias Compartidas
  # ==========================================
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub 'EncuestaFlashSharedLayer-${Environment}'
      Description: Shared dependencies for Encuesta Flash Lambda functions
      ContentUri: layers/shared-layer/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: nodejs20.x

  # ==========================================
  # Lambda Functions - Auth
  # ==========================================

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-RegisterFunction'
      CodeUri: functions/auth/
      Handler: register.handler
      Description: User registration with JWT token generation
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: Register
        Phase: '2.1'

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-LoginFunction'
      CodeUri: functions/auth/
      Handler: login.handler
      Description: User login with JWT token generation
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: Login
        Phase: '2.1'

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-AuthorizerFunction'
      CodeUri: functions/auth/
      Handler: authorizer.handler
      Description: JWT token validator for API Gateway authorization
      # No necesita acceso a DynamoDB, solo valida JWT
      Tags:
        Function: Authorizer
        Phase: '2.2'

  # ==========================================
  # Lambda Functions - Polls CRUD
  # ==========================================

  CreatePollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-CreatePollFunction'
      CodeUri: functions/polls/
      Handler: createPoll.handler
      Description: Create new poll (requires authentication)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: CreatePoll
        Phase: '2.3'

  GetUserPollsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-GetUserPollsFunction'
      CodeUri: functions/polls/
      Handler: getUserPolls.handler
      Description: Get all polls created by authenticated user
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: GetUserPolls
        Phase: '2.3'

  GetPollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-GetPollFunction'
      CodeUri: functions/polls/
      Handler: getPoll.handler
      Description: Get poll details by ID (public)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: GetPoll
        Phase: '2.3'

  VoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-VoteFunction'
      CodeUri: functions/polls/
      Handler: vote.handler
      Description: Register vote in poll (public, anonymous)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: Vote
        Phase: '2.3'

  GetResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-GetResultsFunction'
      CodeUri: functions/polls/
      Handler: getResults.handler
      Description: Get poll results with vote statistics (public)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: GetResults
        Phase: '2.3'

  # ==========================================
  # Placeholder para Fase 4
  # ==========================================

  # Fase 4: WebSocket Functions
  # - ConnectFunction, DisconnectFunction, DefaultFunction, BroadcastFunction

Outputs:
  DynamoDBTableName:
    Description: DynamoDB Table Name
    Value: !Ref EncuestaFlashTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'

  DynamoDBTableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt EncuestaFlashTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'

  DynamoDBStreamArn:
    Description: DynamoDB Stream ARN (for WebSocket broadcast trigger)
    Value: !GetAtt EncuestaFlashTable.StreamArn
    Export:
      Name: !Sub '${AWS::StackName}-StreamArn'

  SharedLayerArn:
    Description: Lambda Layer ARN
    Value: !Ref SharedLayer
    Export:
      Name: !Sub '${AWS::StackName}-LayerArn'
