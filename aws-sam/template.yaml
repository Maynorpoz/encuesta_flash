AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Encuesta Flash (Votify) - Sistema de Encuestas en Tiempo Real
  Arquitectura Serverless con AWS Lambda, API Gateway y DynamoDB

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref EncuestaFlashTable
        JWT_SECRET: !Ref JWTSecret
        NODE_ENV: !Ref Environment
    Layers:
      - !Ref SharedLayer

Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues:
      - development
      - staging
      - production
    Description: Environment name

  JWTSecret:
    Type: String
    Default: 'secret-key-para-encuestas-serverless-2026'
    NoEcho: true
    Description: Secret key for JWT token signing

Resources:
  # ==========================================
  # DynamoDB Table - Single Table Design
  # ==========================================
  EncuestaFlashTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'EncuestaFlashTable-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        # Primary Key
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        # GSI Attributes
        - AttributeName: username
          AttributeType: S
        - AttributeName: creatorId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: pollId
          AttributeType: S

      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

      GlobalSecondaryIndexes:
        # GSI para buscar usuarios por username
        - IndexName: UsernameIndex
          KeySchema:
            - AttributeName: username
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # GSI para buscar polls por creatorId
        - IndexName: CreatorIndex
          KeySchema:
            - AttributeName: creatorId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # GSI para buscar conexiones WebSocket por pollId
        - IndexName: PollIdIndex
          KeySchema:
            - AttributeName: pollId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

      # Habilitar Streams para triggers de broadcast en tiempo real
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

      # TTL para auto-eliminar conexiones WebSocket expiradas
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

      Tags:
        - Key: Project
          Value: EncuestaFlash
        - Key: Environment
          Value: !Ref Environment

  # ==========================================
  # Lambda Layer - Dependencias Compartidas
  # ==========================================
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub 'EncuestaFlashSharedLayer-${Environment}'
      Description: Shared dependencies for Encuesta Flash Lambda functions
      ContentUri: layers/shared-layer/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Retain

  # ==========================================
  # API Gateway REST API
  # ==========================================
  EncuestaFlashApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub '${AWS::StackName}-API'
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowCredentials: false
      Auth:
        DefaultAuthorizer: JWTAuthorizer
        Authorizers:
          JWTAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization
              ValidationExpression: "^Bearer [-0-9a-zA-Z._]*$"
              ReauthorizeEvery: 300

  # ==========================================
  # Lambda Functions - Auth
  # ==========================================

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-RegisterFunction'
      CodeUri: functions/auth/
      Handler: register.handler
      Description: User registration with JWT token generation
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
      Events:
        RegisterApi:
          Type: Api
          Properties:
            RestApiId: !Ref EncuestaFlashApi
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE
      Tags:
        Function: Register
        Phase: '2.1'

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-LoginFunction'
      CodeUri: functions/auth/
      Handler: login.handler
      Description: User login with JWT token generation
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
      Events:
        LoginApi:
          Type: Api
          Properties:
            RestApiId: !Ref EncuestaFlashApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE
      Tags:
        Function: Login
        Phase: '2.1'

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-AuthorizerFunction'
      CodeUri: functions/auth/
      Handler: authorizer.handler
      Description: JWT token validator for API Gateway authorization
      # No necesita acceso a DynamoDB, solo valida JWT
      Tags:
        Function: Authorizer
        Phase: '2.2'

  # ==========================================
  # Lambda Functions - Polls CRUD
  # ==========================================

  CreatePollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-CreatePollFunction'
      CodeUri: functions/polls/
      Handler: createPoll.handler
      Description: Create new poll (requires authentication)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
      Events:
        CreatePollApi:
          Type: Api
          Properties:
            RestApiId: !Ref EncuestaFlashApi
            Path: /polls
            Method: POST
      Tags:
        Function: CreatePoll
        Phase: '2.3'

  GetUserPollsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-GetUserPollsFunction'
      CodeUri: functions/polls/
      Handler: getUserPolls.handler
      Description: Get all polls created by authenticated user
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
      Events:
        GetUserPollsApi:
          Type: Api
          Properties:
            RestApiId: !Ref EncuestaFlashApi
            Path: /polls/me
            Method: GET
      Tags:
        Function: GetUserPolls
        Phase: '2.3'

  GetPollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-GetPollFunction'
      CodeUri: functions/polls/
      Handler: getPoll.handler
      Description: Get poll details by ID (public)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
      Events:
        GetPollApi:
          Type: Api
          Properties:
            RestApiId: !Ref EncuestaFlashApi
            Path: /polls/{pollId}
            Method: GET
            Auth:
              Authorizer: NONE
      Tags:
        Function: GetPoll
        Phase: '2.3'

  VoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-VoteFunction'
      CodeUri: functions/polls/
      Handler: vote.handler
      Description: Register vote in poll (public, anonymous)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
      Events:
        VoteApi:
          Type: Api
          Properties:
            RestApiId: !Ref EncuestaFlashApi
            Path: /polls/vote
            Method: POST
            Auth:
              Authorizer: NONE
      Tags:
        Function: Vote
        Phase: '2.3'

  GetResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-GetResultsFunction'
      CodeUri: functions/polls/
      Handler: getResults.handler
      Description: Get poll results with vote statistics (public)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
      Events:
        GetResultsApi:
          Type: Api
          Properties:
            RestApiId: !Ref EncuestaFlashApi
            Path: /polls/{pollId}/results
            Method: GET
            Auth:
              Authorizer: NONE
      Tags:
        Function: GetResults
        Phase: '2.3'

  # ==========================================
  # WebSocket API
  # ==========================================

  EncuestaFlashWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-WebSocketAPI'
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"
      Description: WebSocket API for real-time poll updates

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref EncuestaFlashWebSocketApi
      StageName: prod
      Description: Production stage for WebSocket API
      AutoDeploy: true

  # ==========================================
  # WebSocket Functions
  # ==========================================

  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ConnectFunction'
      CodeUri: functions/websocket/
      Handler: connect.handler
      Description: Handle WebSocket connection
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: WebSocketConnect
        Phase: '4.2'

  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-DisconnectFunction'
      CodeUri: functions/websocket/
      Handler: disconnect.handler
      Description: Handle WebSocket disconnection
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
      Tags:
        Function: WebSocketDisconnect
        Phase: '4.2'

  DefaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-DefaultFunction'
      CodeUri: functions/websocket/
      Handler: default.handler
      Description: Handle WebSocket messages (subscribe)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EncuestaFlashTable
        - Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
            Resource:
              - !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EncuestaFlashWebSocketApi}/*'
      Tags:
        Function: WebSocketDefault
        Phase: '4.2'

  BroadcastFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-BroadcastFunction'
      CodeUri: functions/websocket/
      Handler: broadcast.handler
      Description: Broadcast poll results to subscribed WebSocket connections
      Environment:
        Variables:
          WEBSOCKET_API_ID: !Ref EncuestaFlashWebSocketApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EncuestaFlashTable
        - Statement:
          - Effect: Allow
            Action:
              - execute-api:ManageConnections
            Resource:
              - !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EncuestaFlashWebSocketApi}/*'
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt EncuestaFlashTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName": ["INSERT"], "dynamodb": {"NewImage": {"SK": {"S": [{"prefix": "VOTE#"}]}}}}'
      Tags:
        Function: WebSocketBroadcast
        Phase: '4.3'

  # ==========================================
  # WebSocket Routes
  # ==========================================

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref EncuestaFlashWebSocketApi
      RouteKey: $connect
      Target: !Sub 'integrations/${ConnectIntegration}'

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref EncuestaFlashWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectFunction.Arn}/invocations'

  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EncuestaFlashWebSocketApi}/*'

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref EncuestaFlashWebSocketApi
      RouteKey: $disconnect
      Target: !Sub 'integrations/${DisconnectIntegration}'

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref EncuestaFlashWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectFunction.Arn}/invocations'

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EncuestaFlashWebSocketApi}/*'

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref EncuestaFlashWebSocketApi
      RouteKey: $default
      Target: !Sub 'integrations/${DefaultIntegration}'

  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref EncuestaFlashWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DefaultFunction.Arn}/invocations'

  DefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DefaultFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EncuestaFlashWebSocketApi}/*'

Outputs:
  DynamoDBTableName:
    Description: DynamoDB Table Name
    Value: !Ref EncuestaFlashTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'

  DynamoDBTableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt EncuestaFlashTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'

  DynamoDBStreamArn:
    Description: DynamoDB Stream ARN (for WebSocket broadcast trigger)
    Value: !GetAtt EncuestaFlashTable.StreamArn
    Export:
      Name: !Sub '${AWS::StackName}-StreamArn'

  SharedLayerArn:
    Description: Lambda Layer ARN
    Value: !Ref SharedLayer
    Export:
      Name: !Sub '${AWS::StackName}-LayerArn'

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${EncuestaFlashApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  WebSocketEndpoint:
    Description: WebSocket API endpoint URL
    Value: !Sub 'wss://${EncuestaFlashWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-WebSocketEndpoint'
